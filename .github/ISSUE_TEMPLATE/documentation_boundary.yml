name: Documentation issue
description: Report unclear public documentation, broken links, routing mistakes, or evidence-boundary wording problems.
title: "[Docs] "
labels: ["documentation", "community"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for public documentation issues: broken links, unclear README flow, missing public references, ambiguous claim boundaries, or confusing GitHub/Hugging Face/Zenodo routing.

        Evidence boundary: do not include private customer data, secrets, private logs, real trading accounts, real transaction records, private review pages, email screenshots, or internal memos.
  - type: input
    id: location
    attributes:
      label: Documentation location
      description: Provide the file path, page URL, section heading, registry row, or anchor.
    validations:
      required: true
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue type
      options:
        - Broken link
        - DOI / GitHub / Zenodo / Hugging Face routing error
        - Claim boundary is unclear
        - Evidence boundary is unclear
        - README entry path is confusing
        - Missing public reference
        - Other
    validations:
      required: true
  - type: textarea
    id: current_text
    attributes:
      label: Current problem
      description: Briefly explain why the current text is unclear, inaccurate, missing public support, or outside the stated boundary.
    validations:
      required: true
  - type: textarea
    id: proposed_text
    attributes:
      label: Proposed change
      description: Provide suggested wording, a target link, or a concise description of the desired documentation change.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Evidence boundary confirmation
      options:
        - label: This is about public documentation, public links, public evidence, or public boundary wording.
          required: true
        - label: This issue does not include private material, private logs, secrets, real trading accounts, real transaction records, internal memos, or copied private narrative material.
          required: true
