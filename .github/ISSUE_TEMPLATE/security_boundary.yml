name: Public security boundary question
description: Ask about public security-boundary wording without posting sensitive details.
title: "[Security Boundary] "
labels: ["security", "boundary"]
body:
  - type: markdown
    attributes:
      value: |
        Use this only for public boundary wording, permission-scope questions, evidence contamination concerns, or safe public-documentation issues.

        If you found a real vulnerability, secret, customer data exposure, private log, exploit chain, real trading account issue, or account-specific incident, do not open a public issue. Follow SECURITY.md and use a private reporting channel.
  - type: input
    id: public_scope
    attributes:
      label: Public scope
      description: Point to the public file, public page, public demo, public documentation section, or public registry row.
    validations:
      required: true
  - type: dropdown
    id: risk_type
    attributes:
      label: Boundary concern type
      options:
        - Permission boundary wording is unclear
        - Evidence contamination or credit leak concern
        - Data exposure warning is insufficient
        - Security claim is too broad
        - Public demo no-go boundary is insufficient
        - Other
    validations:
      required: true
  - type: textarea
    id: concern
    attributes:
      label: Public boundary concern
      description: Describe only the public-level risk. Do not post exploit details, secrets, customer data, real account details, private logs, or incident-specific traces.
    validations:
      required: true
  - type: textarea
    id: repair
    attributes:
      label: Suggested repair
      description: For example, narrow a statement, add a no-go boundary, remove a link, clarify permissions, or update the security policy.
    validations:
      required: false
  - type: checkboxes
    id: public_safe
    attributes:
      label: Public-safety confirmation
      options:
        - label: This issue does not include exploit chains, bypass steps, or instructions for attacking third-party systems.
          required: true
        - label: This issue does not include secrets, customer data, real accounts, private logs, internal execution traces, real trading accounts, or real transaction records.
          required: true
