name: Evidence gap
description: Identify a public claim that needs a stronger public receipt, clearer provenance, or a missing registry link.
title: "[Evidence Gap] "
labels: ["evidence-gap", "claim-boundary"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template when the claim may be reasonable but its public receipt, provenance, registry link, evidence grade, or negative-result record is missing or unclear. If the claim wording itself is too broad or contradicted, use Claim Challenge.

        Evidence boundary: we welcome public references, synthetic examples, reproducible scripts, and sanitized summaries. Do not submit private customer data, secrets, private logs, real accounts, real transaction records, restricted non-public material, or internal execution traces.
  - type: input
    id: claim_or_statement
    attributes:
      label: Claim, statement, or registry row
      description: Link the public claim, README sentence, registry row, paper paragraph, demo page, or release note.
      placeholder: "Example: https://mianzhang.org/docs/public-completion-audit-2026-06-15.html"
    validations:
      required: true
  - type: dropdown
    id: gap_type
    attributes:
      label: Gap type
      options:
        - Missing public receipt
        - Evidence exists but is not linked
        - Provenance is unclear
        - Evidence grade is unsupported
        - Negative result is not documented
        - External provider receipt is missing
        - Other
    validations:
      required: true
  - type: textarea
    id: current_support
    attributes:
      label: Current public support
      description: Summarize what public evidence is currently linked, if any.
      placeholder: |
        Current linked evidence:
        Missing receipt, provenance, or status:
    validations:
      required: true
  - type: textarea
    id: suggested_receipt
    attributes:
      label: Suggested public receipt
      description: Suggest a public dataset, synthetic fixture, script, benchmark, citation, registry entry, console receipt, DOI link, or wording change that would close the gap.
    validations:
      required: false
  - type: checkboxes
    id: boundary
    attributes:
      label: Evidence boundary confirmation
      options:
        - label: This issue uses only public, synthetic, or sanitized material.
          required: true
        - label: This issue does not request or include private customer data, secrets, private logs, real accounts, real transaction records, or internal execution traces.
          required: true
        - label: This issue does not rely on restricted non-public material, private correspondence, or de-anonymizing information.
          required: true
