name: Counterexample report
description: Report a minimal public case that falsifies, narrows, or breaks a specific public claim.
title: "[Counterexample] "
labels: ["counterexample", "claim-boundary"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template when you have a concrete public case that should make a claim fail, narrow, or downgrade. If the issue is only wording scope without a concrete case, use Claim Challenge.

        Evidence boundary: submit only public, reproducible, and safely shareable material. Do not include private customer data, secrets, private logs, real accounts, real transaction records, restricted non-public material, or steps that attack a real system.
  - type: input
    id: target
    attributes:
      label: Target claim
      description: Link the public page, paper card, claim ID, DOI, registry row, concept entry, or demo being challenged.
      placeholder: "Example: https://mianzhang.org/papers/public_index/P46.md"
    validations:
      required: true
  - type: textarea
    id: counterexample
    attributes:
      label: Minimal counterexample
      description: Provide the smallest public input, public or synthetic data, state, prompt, command, or observation that breaks the claim.
      placeholder: |
        Minimal public case:
        Public or synthetic data:
        Claim prediction or expected behavior:
        Observed failure:
    validations:
      required: true
  - type: dropdown
    id: effect
    attributes:
      label: Expected effect
      options:
        - Claim should be narrowed
        - Evidence level should be downgraded
        - Negative result should be recorded
        - Registry status should change
        - Counterexample route should be added
        - Other
    validations:
      required: true
  - type: textarea
    id: repair
    attributes:
      label: Proposed repair
      description: Suggest the smallest wording, status, registry, or evidence-route change.
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Evidence boundary confirmation
      options:
        - label: This counterexample uses only public data, synthetic data, or sanitized samples.
          required: true
        - label: This issue does not include secrets, customer data, private logs, real accounts, real transaction records, or internal execution traces.
          required: true
        - label: This issue does not include restricted non-public material or attack steps against a real system.
          required: true
