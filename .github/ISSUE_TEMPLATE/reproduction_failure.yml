name: Reproduction failure
description: Report a public artifact, script, schema, README, link, or demo path that cannot be reproduced.
title: "[Reproduction] "
labels: ["reproduction", "documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for failures to reproduce public artifacts with public, synthetic, or sanitized sample inputs.

        Evidence boundary: do not upload private data, secrets, local caches, customer logs, confidential review material, real trading accounts, or real transaction records.
  - type: input
    id: artifact
    attributes:
      label: Public artifact
      description: Provide the public URL, file path, DOI, registry row, README section, script, schema, or demo route.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Minimal reproduction steps
      description: Write the shortest command sequence, input, or click path needed to reproduce the failure.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected_actual
    attributes:
      label: Expected result and actual result
      placeholder: |
        Expected:
        Actual:
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python/Node version, browser, public dataset version, dependency version, or other relevant public context.
    validations:
      required: false
  - type: checkboxes
    id: boundary
    attributes:
      label: Evidence boundary confirmation
      options:
        - label: The reproduction uses only public data, synthetic data, or sanitized samples.
          required: true
        - label: This issue does not include secrets, customer data, private logs, local temporary artifacts, real trading accounts, or real transaction records.
          required: true
